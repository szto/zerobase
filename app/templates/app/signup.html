{% extends "app/base.html" %}

{% block title %}시작하기 — zerobase{% endblock %}

{% block body %}
<main class="flex min-h-[80vh] items-center justify-center px-6">
    <div class="w-full max-w-sm rounded-3xl border border-gray-100 bg-white p-8 shadow-xl shadow-gray-100">
        <h1 class="text-2xl font-extrabold tracking-tight">0에서 <span class="text-gradient">시작하기</span></h1>
        <p class="mt-1 text-sm text-gray-400">1분이면 나만의 월드가 생깁니다</p>
        <form method="post" class="mt-7 space-y-3.5">
            {% csrf_token %}
            {% for field in form %}
                {% for error in field.errors %}
                <p class="rounded-xl bg-red-50 px-4 py-2.5 text-sm font-medium text-red-600">{{ error }}</p>
                {% endfor %}
            {% endfor %}
            <input name="username" required autofocus placeholder="아이디" aria-label="아이디"
                   value="{{ form.username.value|default:'' }}"
                   class="w-full rounded-xl border border-gray-200 px-4 py-3 text-sm outline-none transition focus:border-indigo-400 focus:ring-4 focus:ring-indigo-50">
            <input name="password1" type="password" required placeholder="비밀번호" aria-label="비밀번호"
                   class="w-full rounded-xl border border-gray-200 px-4 py-3 text-sm outline-none transition focus:border-indigo-400 focus:ring-4 focus:ring-indigo-50">
            <input name="password2" type="password" required placeholder="비밀번호 확인" aria-label="비밀번호 확인"
                   class="w-full rounded-xl border border-gray-200 px-4 py-3 text-sm outline-none transition focus:border-indigo-400 focus:ring-4 focus:ring-indigo-50">
            <button type="submit" class="btn-gradient w-full rounded-xl py-3 font-bold text-white">가입하고 시작하기</button>
        </form>
        <p class="mt-5 text-center text-sm text-gray-400">
            이미 계정이 있나요? <a href="/login/" class="font-semibold text-indigo-600 hover:underline">로그인</a>
        </p>
    </div>
</main>
{% endblock %}
