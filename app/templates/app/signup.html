{% extends "app/base.html" %}

{% block title %}시작하기 — zerobase{% endblock %}

{% block body %}
<main class="mx-auto max-w-sm px-6 py-16">
    <h1 class="text-2xl font-bold">시작하기</h1>
    <p class="mt-1 text-sm text-gray-500">1분이면 나만의 월드를 만들 수 있습니다.</p>
    <form method="post" class="mt-6 space-y-4">
        {% csrf_token %}
        {% for field in form %}
            {% for error in field.errors %}
            <p class="rounded-lg bg-red-50 px-4 py-2 text-sm text-red-600">{{ error }}</p>
            {% endfor %}
        {% endfor %}
        <input name="username" required autofocus placeholder="아이디" aria-label="아이디"
               value="{{ form.username.value|default:'' }}"
               class="w-full rounded-lg border px-4 py-2">
        <input name="password1" type="password" required placeholder="비밀번호" aria-label="비밀번호"
               class="w-full rounded-lg border px-4 py-2">
        <input name="password2" type="password" required placeholder="비밀번호 확인" aria-label="비밀번호 확인"
               class="w-full rounded-lg border px-4 py-2">
        <button type="submit" class="w-full rounded-lg bg-blue-600 py-2.5 font-medium text-white hover:bg-blue-700">
            가입하고 시작하기
        </button>
    </form>
    <p class="mt-4 text-center text-sm text-gray-500">
        이미 계정이 있나요? <a href="/login/" class="text-blue-600 hover:underline">로그인</a>
    </p>
</main>
{% endblock %}
