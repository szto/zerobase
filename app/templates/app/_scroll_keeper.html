<script>
// 전체-HTML 업데이트(dj-root 교체) 시 창 스크롤 위치 보존.
// djust 는 포커스 요소 내부 scrollTop 만 보존하고 window 스크롤은 리셋된다.
(function () {
    var y = 0, lockUntil = 0;
    addEventListener("scroll", function () {
        if (Date.now() > lockUntil) y = scrollY;
    }, { passive: true });
    function arm() {
        var root = document.querySelector("[dj-root]");
        if (!root) return setTimeout(arm, 200);
        new MutationObserver(function () {
            if (Math.abs(scrollY - y) > 80) {
                lockUntil = Date.now() + 400;
                scrollTo(0, y);
            }
        }).observe(root, { childList: true, subtree: true });
    }
    arm();
})();
</script>
