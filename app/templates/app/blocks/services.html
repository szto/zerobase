<section class="mx-auto max-w-2xl px-6 py-12">
    <h2 class="text-xl font-bold" style="color: {{ world.theme_color }}">{{ cfg.heading }}</h2>
    <ul class="mt-4 divide-y divide-gray-100">
        {% for item in cfg.items %}
        <li class="flex items-baseline justify-between gap-4 py-3">
            <div>
                <span class="font-medium">{{ item.name }}</span>
                {% if item.description %}<p class="text-sm text-gray-500">{{ item.description }}</p>{% endif %}
            </div>
            {% if item.price %}<span class="shrink-0 text-sm font-semibold text-gray-700">{{ item.price }}</span>{% endif %}
        </li>
        {% empty %}
        <li class="py-3 text-sm text-gray-400">아직 등록된 항목이 없습니다.</li>
        {% endfor %}
    </ul>
</section>
