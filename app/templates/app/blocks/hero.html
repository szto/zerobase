<section class="relative overflow-hidden px-6 py-24 text-center text-white"
         style="background: linear-gradient(140deg, var(--theme), color-mix(in srgb, var(--theme) 55%, #111827))">
    <div class="pointer-events-none absolute -right-20 -top-20 h-72 w-72 rounded-full opacity-25 blur-3xl"
         style="background: color-mix(in srgb, var(--theme) 30%, white)"></div>
    <div class="relative mx-auto max-w-2xl">
        {% if world.tagline %}
        <span class="rounded-full border border-white/25 bg-white/10 px-4 py-1.5 text-xs font-semibold tracking-wide backdrop-blur">
            {{ world.tagline }}
        </span>
        {% endif %}
        <h1 class="mt-5 text-4xl font-extrabold leading-tight tracking-tight sm:text-5xl">{{ cfg.title }}</h1>
        {% if cfg.subtitle %}<p class="mt-4 text-lg leading-relaxed opacity-85">{{ cfg.subtitle }}</p>{% endif %}
    </div>
</section>
