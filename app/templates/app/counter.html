{% extends "app/base.html" %}

{% block title %}Counter Demo{% endblock %}

{% block body %}
<main dj-view="app.views.CounterView" dj-root
      class="mx-auto flex min-h-screen max-w-md flex-col items-center justify-center gap-6">
    <h1 class="text-2xl font-bold">djust Counter</h1>

    <p class="text-6xl font-mono tabular-nums">{{ count }}</p>

    <div class="flex gap-3">
        <button dj-click="decrement"
                class="rounded-lg bg-gray-200 px-6 py-2 text-xl hover:bg-gray-300">−</button>
        <button dj-click="increment"
                class="rounded-lg bg-blue-600 px-6 py-2 text-xl text-white hover:bg-blue-700">+</button>
    </div>

    <!-- Alpine.js 는 클라이언트 전용 상태에 사용 (서버 상태는 djust).
         djust 와의 충돌을 피하기 위해 @click 대신 x-on:click 표기를 쓴다. -->
    <div x-data="{ open: false }" class="text-sm text-gray-500">
        <button x-on:click="open = !open" class="underline">이 데모는?</button>
        <p x-show="open" x-cloak class="mt-2">
            서버 상태는 djust(WebSocket), UI 토글은 Alpine.js, 스타일은 Tailwind.
        </p>
    </div>
</main>
{% endblock %}
