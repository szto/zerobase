{% extends "app/base.html" %}

{% block title %}zerobase — 나만의 비즈니스 사이트를 몇 분 만에{% endblock %}

{% block body %}
<main dj-view="app.views.LandingView" dj-root>
    <section class="mx-auto flex min-h-[60vh] max-w-2xl flex-col items-center justify-center px-6 text-center">
        <h1 class="text-4xl font-extrabold tracking-tight sm:text-5xl">
            0에서 시작하는<br>나만의 비즈니스
        </h1>
        <p class="mt-4 text-lg text-gray-500">
            블록을 조립해 사이트를 만들고, 문의를 받고, 세계를 넓혀가세요.<br>
            코딩도 설치도 필요 없습니다.
        </p>
        <div class="mt-8 flex gap-3">
            <a href="/signup/" class="rounded-xl bg-blue-600 px-6 py-3 font-medium text-white hover:bg-blue-700">
                무료로 시작하기
            </a>
            <a href="/studio/" class="rounded-xl border px-6 py-3 font-medium text-gray-700 hover:bg-gray-100">
                내 스튜디오
            </a>
        </div>
        {% if world_count %}
        <p class="mt-10 text-sm text-gray-400">지금까지 {{ world_count }}개의 월드가 만들어졌습니다</p>
        {% endif %}
    </section>
</main>
{% endblock %}
