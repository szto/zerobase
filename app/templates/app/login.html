{% extends "app/base.html" %}

{% block title %}로그인 — zerobase{% endblock %}

{% block body %}
<main class="mx-auto max-w-sm px-6 py-16">
    <h1 class="text-2xl font-bold">로그인</h1>
    <form method="post" class="mt-6 space-y-4">
        {% csrf_token %}
        {% if form.errors %}
        <p class="rounded-lg bg-red-50 px-4 py-3 text-sm text-red-600">아이디 또는 비밀번호가 올바르지 않습니다.</p>
        {% endif %}
        <input name="username" required autofocus placeholder="아이디" aria-label="아이디"
               class="w-full rounded-lg border px-4 py-2">
        <input name="password" type="password" required placeholder="비밀번호" aria-label="비밀번호"
               class="w-full rounded-lg border px-4 py-2">
        <button type="submit" class="w-full rounded-lg bg-blue-600 py-2.5 font-medium text-white hover:bg-blue-700">
            로그인
        </button>
    </form>
    <p class="mt-4 text-center text-sm text-gray-500">
        계정이 없나요? <a href="/signup/" class="text-blue-600 hover:underline">가입하기</a>
    </p>
</main>
{% endblock %}
