{% extends "app/base.html" %}

{% block title %}로그인 — zerobase{% endblock %}

{% block body %}
<main class="flex min-h-[80vh] items-center justify-center px-6">
    <div class="w-full max-w-sm rounded-3xl border border-gray-100 bg-white p-8 shadow-xl shadow-gray-100">
        <h1 class="text-2xl font-extrabold tracking-tight">다시 만나서 반가워요</h1>
        <p class="mt-1 text-sm text-gray-400">내 월드로 돌아갑니다</p>
        <form method="post" class="mt-7 space-y-3.5">
            {% csrf_token %}
            {% if form.errors %}
            <p class="rounded-xl bg-red-50 px-4 py-3 text-sm font-medium text-red-600">아이디 또는 비밀번호가 올바르지 않습니다.</p>
            {% endif %}
            <input name="username" required autofocus placeholder="아이디" aria-label="아이디"
                   class="w-full rounded-xl border border-gray-200 px-4 py-3 text-sm outline-none transition focus:border-indigo-400 focus:ring-4 focus:ring-indigo-50">
            <input name="password" type="password" required placeholder="비밀번호" aria-label="비밀번호"
                   class="w-full rounded-xl border border-gray-200 px-4 py-3 text-sm outline-none transition focus:border-indigo-400 focus:ring-4 focus:ring-indigo-50">
            <button type="submit" class="btn-gradient w-full rounded-xl py-3 font-bold text-white">로그인</button>
        </form>
        <p class="mt-5 text-center text-sm text-gray-400">
            계정이 없나요? <a href="/signup/" class="font-semibold text-indigo-600 hover:underline">가입하기</a>
        </p>
    </div>
</main>
{% endblock %}
